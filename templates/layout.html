<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Atharva Upadhyay{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Global Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Page-specific Font Loads -->
    {% block fonts %}{% endblock %}

    <!-- Global CSS -->
    <link rel="stylesheet" href="/static/css/global.css">

    <!-- Page-specific CSS -->
    {% block styles %}{% endblock %}

    <!-- Mandala Opacity Overrides from Environment Variables -->
    <style>
        :root {
            --mandala-light-opacity: 0.05;
        }

        .dark-theme {
            --mandala-dark-opacity: 0.025;
        }
    </style>

    <!-- Inline Script to prevent dark mode flash on load -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>

    <!-- Vercel Speed Insights -->
    <script type="module">
        import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@1/dist/index.mjs';
        injectSpeedInsights();
    </script>
    {# Vercel Web Analytics #}
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>

<body>

    <div class="container">

        <!-- Theme Toggle Button -->
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light theme">
            <!-- Moon Icon (Light Mode Active) -->
            <svg class="moon-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12.3 22h-.1c-5.5-.2-9.9-4.8-9.9-10.4C2.3 6 7 1.3 12.8 1.3c.3 0 .7 0 1 .1.4.1.7.5.5.9-.1.4-.5.7-.9.6-.3 0-.6-.1-.9-.1-4.7 0-8.5 3.8-8.5 8.6 0 4.6 3.6 8.4 8.2 8.6.4 0 .7.4.7.8-.1.4-.4.7-.8.7-.3.1-.6.1-.9.1zm1.3-4.3c.3 0 .6-.1.9-.1.4-.1.8.1.9.5.1.4-.1.8-.5.9-.9.3-1.9.4-2.9.3-.4-.1-.7-.4-.6-.8.1-.4.4-.7.8-.6 1 .1 1.9 0 2.4-.2zm6.2-3.8c-.2.3-.5.5-.9.4-.4-.1-.7-.4-.6-.8 0-.3.1-.6.1-.9 0-4.7-3.8-8.6-8.6-8.6-.3 0-.6 0-.9.1-.4.1-.8-.1-.9-.5-.1-.4.1-.8.5-.9.9-.2 1.9-.3 2.9-.3 5.5.2 9.9 4.8 9.9 10.4 0 .3 0 .7-.1 1.1z" />
            </svg>
            <!-- Sun Icon (Dark Mode Active) -->
            <svg class="sun-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12 4.6c-.8 0-1.4-.6-1.4-1.4V2c0-.8.6-1.4 1.4-1.4s1.4.6 1.4 1.4v1.2c0 .8-.6 1.4-1.4 1.4zm0 14.8c-.8 0-1.4.6-1.4 1.4v1.2c0 .8.6 1.4 1.4 1.4s1.4-.6 1.4-1.4v-1.2c0-.8-.6-1.4-1.4-1.4zm7.4-9.6c.8 0 1.4.6 1.4 1.4H22c0 .8-.6 1.4-1.4 1.4h-1.2c-.8 0-1.4-.6-1.4-1.4s.6-1.4 1.4-1.4zM4.6 12c0-.8-.6-1.4-1.4-1.4H2c0 .8.6 1.4 1.4 1.4h1.2c.8 0 1.4-.6 1.4-1.4zm11.2-5.8c.5-.5 1.3-.5 1.8 0l.9.9c.5.5.5 1.3 0 1.8s-1.3.5-1.8 0l-.9-.9c-.5-.5-.5-1.3 0-1.8zm-7.6 7.6c.5-.5 1.3-.5 1.8 0l.9.9c.5.5.5 1.3 0 1.8s-1.3.5-1.8 0l-.9-.9c-.5-.5-.5-1.3 0-1.8zm7.6 0c.5.5.5 1.3 0 1.8l-.9.9c-.5.5-1.3.5-1.8 0s-.5-1.3 0-1.8l.9-.9c.5-.5 1.3-.5 1.8 0zm-7.6-7.6c.5.5.5 1.3 0 1.8l-.9.9c-.5.5-1.3.5-1.8 0s-.5-1.3 0-1.8l.9-.9c.5-.5 1.3-.5 1.8 0zM12 6c-3.3 0-6 2.7-6 6s2.7 6 6 6 6-2.7 6-6-2.7-6-6-6zm0 10.6c-2.5 0-4.6-2.1-4.6-4.6s2.1-4.6 4.6-4.6 4.6 2.1 4.6 4.6-2.1 4.6-4.6 4.6z" />
            </svg>
        </button>
        <!-- Hero Section -->
        {% block hero %}{% endblock %}


        <!-- Footer (common) -->
        <footer>
            © 2019 - 2026 Atharva Upadhyay
        </footer>

    </div>


    <!-- Theme Toggle Script -->
    <script>
        const toggleButton = document.getElementById('theme-toggle');

        // Initial setup based on localStorage or preferences
        const getPreferredTheme = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                return savedTheme;
            }
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        };

        const applyTheme = (theme) => {
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
                document.documentElement.classList.add('dark-theme');
            } else {
                document.body.classList.remove('dark-theme');
                document.documentElement.classList.remove('dark-theme');
            }
        };

        // Apply immediately
        applyTheme(getPreferredTheme());

        toggleButton.addEventListener('click', () => {
            const isDark = document.body.classList.contains('dark-theme');
            const newTheme = isDark ? 'light' : 'dark';

            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>

</html>
